<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wavelength Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-vignette"></div>
    <div class="grain"></div>

    <main class="app">
      <header class="top-bar">
        <article class="team-card team-left active" id="team0Card">
          <input
            id="team0Name"
            class="team-name"
            type="text"
            value="Team Aurora"
            maxlength="24"
            aria-label="Team Aurora name"
          />
          <p class="team-score" id="team0Score">0</p>
        </article>

        <div class="status-cluster">
          <div class="round-pill">
            <span>Round</span>
            <strong id="roundCount">1</strong>
          </div>
          <p class="phase-badge" id="phaseBadge">Psychic View</p>
        </div>

        <article class="team-card team-right" id="team1Card">
          <input
            id="team1Name"
            class="team-name"
            type="text"
            value="Team Ember"
            maxlength="24"
            aria-label="Team Ember name"
          />
          <p class="team-score" id="team1Score">0</p>
        </article>
      </header>

      <section class="board">
        <div class="wheel-layout">
          <div class="orb-tag side-indicator side-left-indicator" aria-hidden="true">
            LEFT
          </div>
          <div class="wheel-shell" id="wheelShell">
            <canvas id="spectrumCanvas" class="layer rotatable-spectrum"></canvas>
            <canvas id="targetCanvas" class="layer rotatable-spectrum"></canvas>

            <div class="cover-layer open" id="coverLayer" aria-hidden="true">
              <div class="cover-panel"></div>
            </div>
            <div class="cover-handle-overlay" aria-hidden="true"></div>
            <button
              id="spinWheelBtn"
              class="spin-wheel-btn"
              type="button"
              aria-label="Spin the wheel"
            >
              <span class="spin-wheel-btn-icon" aria-hidden="true">&#8635;</span>
              <span class="spin-wheel-btn-label">Spin</span>
            </button>

            <div class="pointer-layer" id="pointerLayer">
              <div id="spindle" class="spindle"></div>
              <div class="pivot"></div>
            </div>

            <div class="score-popup" id="scorePopup"></div>

            <div class="spectrum-card" aria-hidden="true">
              <div class="spectrum-side spectrum-left">
                <span class="spectrum-arrow">&#8592;</span>
                <span id="leftLabel">Hot</span>
              </div>
              <div class="spectrum-side spectrum-right">
                <span class="spectrum-arrow">&#8594;</span>
                <span id="rightLabel">Cold</span>
              </div>
            </div>
            <div class="new-tag" aria-hidden="true">NEW</div>
          </div>
          <div class="orb-tag side-indicator side-right-indicator" aria-hidden="true">
            RIGHT
          </div>
        </div>
      </section>

      <section class="control-panel">
        <div class="actions">
          <button id="startGuessBtn" class="btn btn-primary">
            Hide Target &amp; Start Guess
          </button>
          <button id="revealBtn" class="btn btn-secondary" disabled>
            Reveal
          </button>
          <button id="resetRoundBtn" class="btn btn-secondary" disabled>
            Reset Round
          </button>
          <button id="nextRoundBtn" class="btn btn-secondary" disabled>
            Next Round
          </button>
          <button id="newGameBtn" class="btn btn-ghost">New Game</button>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
